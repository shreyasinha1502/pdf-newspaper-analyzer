services:
  - type: web
    name: pdf-newspaper-analyzer
    env: docker
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PDF_ANALYZER_MAX_FILE_SIZE_MB
        value: "100"
      - key: PDF_ANALYZER_MAX_PAGES
        value: "300"
      - key: PDF_ANALYZER_MAX_WORKERS
        value: "2"
